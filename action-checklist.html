<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Action Items · Robot Sales Excom Feb 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sarabun', sans-serif; background: #0F172A; color: #E2E8F0; min-height: 100vh; }

  .header { background: linear-gradient(135deg, #1E293B 0%, #0F172A 100%); border-bottom: 1px solid #1E293B; padding: 28px 20px 20px; }
  .header-inner { max-width: 760px; margin: 0 auto; }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .label { font-size: 11px; font-weight: 600; letter-spacing: 0.15em; color: #64748B; text-transform: uppercase; margin-bottom: 6px; }
  h1 { font-size: 24px; font-weight: 700; color: #F1F5F9; line-height: 1.2; }
  .subtitle { margin-top: 5px; font-size: 13px; color: #94A3B8; }
  .pct { font-size: 36px; font-weight: 700; color: #38BDF8; line-height: 1; text-align: right; }
  .pct-sub { font-size: 12px; color: #64748B; margin-top: 2px; text-align: right; }
  .progress-bar { margin-top: 18px; background: #1E293B; border-radius: 999px; height: 8px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #38BDF8, #818CF8); border-radius: 999px; transition: width 0.4s ease; }
  .team-pills { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .pill { display: flex; align-items: center; gap: 6px; background: #1E293B; border-radius: 999px; padding: 4px 10px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .pill-label { font-size: 12px; color: #94A3B8; }
  .pill-count { font-size: 12px; font-weight: 600; }

  .filters { background: #0F172A; border-bottom: 1px solid #1E293B; padding: 12px 20px; position: sticky; top: 0; z-index: 10; }
  .filters-inner { max-width: 760px; margin: 0 auto; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .filter-label { font-size: 12px; color: #64748B; margin-right: 2px; }
  .btn { padding: 5px 12px; border-radius: 999px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; font-family: 'Sarabun', sans-serif; background: #1E293B; color: #94A3B8; transition: all 0.15s; }
  .btn.active-blue { background: #38BDF8; color: #0F172A; }
  .btn.active-red { background: #EF4444; color: #fff; }
  .btn.active-yellow { background: #F59E0B; color: #fff; }
  .divider { width: 1px; height: 20px; background: #1E293B; margin: 0 4px; }
  .btn-ghost { padding: 5px 12px; border-radius: 999px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid #334155; background: transparent; color: #64748B; font-family: 'Sarabun', sans-serif; margin-left: auto; }

  .list { max-width: 760px; margin: 0 auto; padding: 20px 20px 60px; }
  .team-section { margin-bottom: 26px; }
  .team-heading { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .team-bar { width: 3px; height: 18px; border-radius: 2px; }
  .team-name { font-size: 12px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
  .team-line { height: 1px; flex: 1; }

  .card { border-radius: 10px; overflow: hidden; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; }
  .card:hover { transform: translateY(-1px); }
  .card-main { display: flex; align-items: flex-start; gap: 14px; padding: 14px 16px; }
  .card-icon { width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; font-size: 13px; }
  .card-body { flex: 1; min-width: 0; }
  .card-title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .card-title { font-size: 15px; font-weight: 600; color: #E2E8F0; line-height: 1.4; }
  .badge { flex-shrink: 0; font-size: 10px; font-weight: 700; letter-spacing: 0.05em; padding: 3px 8px; border-radius: 999px; }
  .badge-urgent { background: #EF444422; color: #EF4444; }
  .badge-watch { background: #F59E0B22; color: #F59E0B; }
  .card-meta { margin-top: 4px; display: flex; gap: 12px; flex-wrap: wrap; }
  .meta-item { font-size: 12px; color: #64748B; }
  .card-desc { padding: 0 16px 14px 52px; font-size: 13px; color: #94A3B8; line-height: 1.6; border-top: 1px solid #ffffff08; padding-top: 10px; }
  .chevron { color: #475569; font-size: 11px; flex-shrink: 0; margin-top: 4px; }

  .empty { text-align: center; padding: 60px 0; color: #475569; }
  .empty-icon { font-size: 40px; }
  .empty-text { margin-top: 12px; font-size: 15px; }

  @media (max-width: 480px) {
    .header { padding: 20px 16px 16px; }
    h1 { font-size: 20px; }
    .pct { font-size: 28px; }
    .list { padding: 16px 16px 60px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div>
        <div class="label">Robot Sales Excom · Feb 26 / Mar 6, 2026</div>
        <h1>Action Items Checklist</h1>
        <div class="subtitle">ติดตามงานหลังประชุม · อัปเดตล่าสุด มี.ค. 2026</div>
      </div>
      <div>
        <div class="pct" id="pctDisplay">0%</div>
        <div class="pct-sub" id="pctSub">0 / 17 เสร็จแล้ว</div>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="team-pills" id="teamPills"></div>
  </div>
</div>

<div class="filters">
  <div class="filters-inner">
    <span class="filter-label">ทีม:</span>
    <button class="btn active-blue" data-team="all" onclick="setTeam(this,'all')">ทั้งหมด</button>
    <button class="btn" data-team="ทีมขาย" onclick="setTeam(this,'ทีมขาย')">ทีมขาย</button>
    <button class="btn" data-team="บัญชี" onclick="setTeam(this,'บัญชี')">บัญชี</button>
    <button class="btn" data-team="Engineering" onclick="setTeam(this,'Engineering')">Engineering</button>
    <button class="btn" data-team="Management" onclick="setTeam(this,'Management')">Management</button>
    <div class="divider"></div>
    <span class="filter-label">ระดับ:</span>
    <button class="btn active-blue" data-pri="all" onclick="setPri(this,'all')">ทั้งหมด</button>
    <button class="btn" data-pri="urgent" onclick="setPri(this,'urgent')">🔴 เร่งด่วน</button>
    <button class="btn" data-pri="watch" onclick="setPri(this,'watch')">🟡 ติดตาม</button>
  </div>
</div>

<div class="list" id="list"></div>

<script>
const ACTIONS = [
  { id:"s1", team:"ทีมขาย", owner:"ซิ, บาร์ท, เบิ้ม", pri:"urgent", deadline:"ต่อเนื่องรายเดือน", title:"เร่งแปลง Quotation → PO → Invoice", desc:"Quotation สะสม 51.6M — โฟกัส Pipeline 19.7M (Win Rate 50–79%) ให้ปิดได้ก่อนสิ้นปี" },
  { id:"s2", team:"ทีมขาย", owner:"ซิ, บาร์ท", pri:"urgent", deadline:"ภายใน 2 สัปดาห์", title:"ทำ Cluster Database กลุ่ม Non-Automotive", desc:"โรงงานบรรจุภัณฑ์ (กระสอบ/กล่อง/ถุง), อาหารสัตว์, นม, น้ำหวาน — ลงพื้นที่เยี่ยมลูกค้า" },
  { id:"s3", team:"ทีมขาย", owner:"ซิ, บาร์ท", pri:"urgent", deadline:"ทุกการประชุม", title:"ส่ง Focus Lead + Forecast PO รายเดือนใน Revenue Tracker", desc:"ทุก Column: Backlog 32M / Focus Lead 36.7M / Pipeline 19.7M / Service 1.5M" },
  { id:"s4", team:"ทีมขาย", owner:"เบิ้ม + ตี้", pri:"urgent", deadline:"ทุกการประชุม (เริ่มครั้งหน้า)", title:"Track & Confirm ยอดรายรับตาม Revenue Tracker ทุก Column", desc:"แต่ละช่องเข้ามาแล้วเท่าไร และมีโอกาสหลุดไหม — report ทุกประชุม" },
  { id:"s5", team:"ทีมขาย", owner:"เบิ้ม (Partnerships)", pri:"watch", deadline:"เมื่อ PO ยืนยัน", title:"Update สถานะ Dazzle — รอ PO Toyota งานแรก", desc:"PO ~3–4 แสน (งาน Digital Twin) ยืนยันแล้วค่อย Forecast ยอดต่อ ปีนี้ 5แสน–1M" },
  { id:"s6", team:"ทีมขาย", owner:"เบิ้ม (Partnerships)", pri:"watch", deadline:"เมื่อ PO ยืนยัน", title:"Update สถานะ Yamazen — งานรอติดตั้งอยู่แล้ว", desc:"เมื่อยืนยันได้ให้ update ยอด ~20M ใน Revenue Tracker (เป้าระยะยาว 50M)" },
  { id:"s7", team:"ทีมขาย", owner:"บาร์ท", pri:"watch", deadline:"วันจันทร์ถัดไป", title:"ส่งข้อมูล Leads ใหม่ (CPI, HDD Supplier, Calcom cluster) ให้ทีม", desc:"เพื่อ Coordinate กับ Sales คนอื่น" },
  { id:"f1", team:"บัญชี", owner:"แตง", pri:"urgent", deadline:"ภายในเดือนนี้", title:"แก้ไขการ Allocate Overhead เข้าแต่ละ Job ให้ครบ", desc:"ตรวจสอบว่าปั้นโอเวอร์เฮดครบทุก Job ไหม — ไม่ใช่แค่ DM+DL" },
  { id:"f2", team:"บัญชี", owner:"แตง", pri:"urgent", deadline:"รอบบัญชีถัดไป", title:"ใช้ DL จากระบบ HR (ชั่วโมงจริงต่อ Job) แทนการประมาณการ", desc:"ดึงข้อมูลชั่วโมงทำงานจริงจาก HR System มาคำนวณ Direct Labor Cost" },
  { id:"f3", team:"บัญชี", owner:"แตง", pri:"urgent", deadline:"ภายในเดือนนี้", title:"แยก Cost of Sales กับ S&A ออกจากกัน — ทำ P&L ที่ถูกต้อง", desc:"ปัจจุบันปนกันอยู่ ทำให้บริหารตัวเลขยาก GP จึงคลาดเคลื่อน" },
  { id:"f4", team:"บัญชี", owner:"แตง", pri:"urgent", deadline:"ก่อนประชุมครั้งหน้า", title:"ทำ P&L ใหม่ Target Revenue 100M แตกรายเดือน", desc:"แสดงว่า GP จะเป็นเท่าไรจริงๆ (เดิม Budget 65M → ปรับ 100M) — ต้อง Align กับ Sales" },
  { id:"f5", team:"บัญชี", owner:"แตง + เบิ้ม", pri:"watch", deadline:"ภายใน 2 สัปดาห์", title:"คุยเรื่องสร้าง Dummy Project สำหรับ Overhead ส่วนกลาง", desc:"เดือนที่มีงานน้อย → ไม่ให้ Overhead ไปกระจุกอยู่ Job เดียวจน GP บิดเบือน" },
  { id:"f6", team:"บัญชี", owner:"แตง", pri:"watch", deadline:"ภายในเดือนนี้", title:"แยก OT + ตรวจสอบ Job ที่มี Additional PO แยกใบ", desc:"Job ที่ลูกค้าขอ Spec เพิ่ม → PO แยกใบ แต่ Cost รวมอยู่ Job เดิม → GP โชว์ผิด" },
  { id:"e1", team:"Engineering", owner:"ตุ๋น + ทีม Eng", pri:"watch", deadline:"ต่อเนื่อง (กำลัง implement)", title:"Implement AI ช่วย key BOM เข้าระบบแทน Excel", desc:"ลดเวลางาน Eng 30–35%, ลด OT, ลดกระดาษ — กำลัง implement อยู่" },
  { id:"m1", team:"Management", owner:"RT (ผู้จัดการประชุม)", pri:"urgent", deadline:"ประชุมครั้งถัดไป", title:"เริ่มประชุมด้วยการ Follow-up Action Items จากครั้งก่อนทุกครั้ง", desc:"ตัวอย่างปัญหา: ขอ Budget เปรียบเทียบ → ส่งมาแล้วไม่มี Budget — ต้องไม่เกิดซ้ำ" },
  { id:"m2", team:"Management", owner:"RT (ผู้จัดการประชุม)", pri:"urgent", deadline:"ทันที", title:"กำหนด Action Owner + Deadline ชัดเจนทุกประเด็น", desc:"ไม่ให้ประเด็นใดค้างอยู่โดยไม่มีคนรับผิดชอบ" },
  { id:"m3", team:"Management", owner:"แตง (เลขานุการ)", pri:"watch", deadline:"หลังประชุมทุกครั้ง", title:"ส่ง Meeting Summary + Action Items ภายใน 24 ชม. หลังประชุม", desc:"และ Follow-up กับ Owner แต่ละคน — ไม่ใช่แค่เก็บไว้คนเดียว" },
];

const TEAM_COLORS = { "ทีมขาย":"#3B82F6", "บัญชี":"#8B5CF6", "Engineering":"#10B981", "Management":"#F59E0B" };
const TEAMS = ["ทีมขาย","บัญชี","Engineering","Management"];
let teamFilter = "all", priFilter = "all";
let expanded = {};

function render() {
  const total = ACTIONS.length;
  const done = 0; // read-only mode
  const pct = 0;

  document.getElementById("pctDisplay").textContent = total + " รายการ";
  document.getElementById("pctDisplay").style.color = "#38BDF8";
  document.getElementById("pctSub").textContent = "สแกน QR หรือแชร์ลิงก์เพื่อดู";
  document.getElementById("progressFill").style.width = "100%";
  document.getElementById("progressFill").style.background = "linear-gradient(90deg,#38BDF8,#818CF8)";

  // Pills
  const pillsEl = document.getElementById("teamPills");
  pillsEl.innerHTML = TEAMS.map(team => {
    const count = ACTIONS.filter(a => a.team === team).length;
    const urgent = ACTIONS.filter(a => a.team === team && a.pri === "urgent").length;
    return `<div class="pill" style="border:1px solid ${TEAM_COLORS[team]}33">
      <div class="dot" style="background:${TEAM_COLORS[team]}"></div>
      <span class="pill-label">${team}</span>
      <span class="pill-count" style="color:${TEAM_COLORS[team]}">${count} รายการ · ${urgent} เร่งด่วน</span>
    </div>`;
  }).join("");

  // Filter
  const filtered = ACTIONS.filter(a => {
    if (teamFilter !== "all" && a.team !== teamFilter) return false;
    if (priFilter !== "all" && a.pri !== priFilter) return false;
    return true;
  });

  const listEl = document.getElementById("list");
  if (filtered.length === 0) {
    listEl.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">ไม่มีรายการในหมวดนี้</div></div>`;
    return;
  }

  let html = "";
  for (const team of TEAMS) {
    const items = filtered.filter(a => a.team === team);
    if (!items.length) continue;
    const col = TEAM_COLORS[team];
    html += `<div class="team-section">
      <div class="team-heading">
        <div class="team-bar" style="background:${col}"></div>
        <span class="team-name" style="color:${col}">${team}</span>
        <div class="team-line" style="background:${col}22"></div>
      </div>`;
    for (const a of items) {
      const isOpen = !!expanded[a.id];
      const icon = a.pri === "urgent" ? "🔴" : "🟡";
      html += `<div class="card" id="card-${a.id}" style="background:#1E293B;border:1px solid #334155;border-left:3px solid ${a.pri==='urgent'?'#EF4444':'#F59E0B'}">
        <div class="card-main" onclick="toggleCard('${a.id}')">
          <div class="card-icon">${icon}</div>
          <div class="card-body">
            <div class="card-title-row">
              <div class="card-title">${a.title}</div>
              <span class="badge ${a.pri==='urgent'?'badge-urgent':'badge-watch'}">${a.pri==='urgent'?'เร่งด่วน':'ติดตาม'}</span>
            </div>
            <div class="card-meta">
              <span class="meta-item">👤 ${a.owner}</span>
              <span class="meta-item">⏰ ${a.deadline}</span>
            </div>
          </div>
          <div class="chevron" id="chev-${a.id}">${isOpen?'▲':'▼'}</div>
        </div>
        ${isOpen ? `<div class="card-desc">${a.desc}</div>` : ''}
      </div>`;
    }
    html += `</div>`;
  }
  listEl.innerHTML = html;
}

function toggleCard(id) {
  expanded[id] = !expanded[id];
  render();
}

function setTeam(el, val) {
  document.querySelectorAll('[data-team]').forEach(b => b.className = 'btn');
  el.className = 'btn active-blue';
  teamFilter = val;
  render();
}

function setPri(el, val) {
  document.querySelectorAll('[data-pri]').forEach(b => b.className = 'btn');
  if (val === 'urgent') el.className = 'btn active-red';
  else if (val === 'watch') el.className = 'btn active-yellow';
  else el.className = 'btn active-blue';
  priFilter = val;
  render();
}

render();
</script>
</body>
</html>
